service: ai-app-backend
plugins:
  - serverless-plugin-typescript

useDotenv: true

provider:
  name: aws
  runtime: nodejs18.x
  stackName: ai-app-backend
  region: ap-south-1
  versionFunctions: false
  environment:
    OPENAI_KEY: ${env:OPENAI_KEY}
functions:
  callchatgpt:
    handler: handler.main
    url:
      cors: true
    timeout: 120